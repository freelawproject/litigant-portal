[tox]
envlist = py{313}

[testenv]
runner = uv-venv-lock-runner
package = wheel
wheel_build_env = .pkg
extras = dev
setenv =
    DJANGO_SETTINGS_MODULE = litigant_portal.settings
    SECRET_KEY = test-secret-key-for-ci
    DEBUG = true
    POSTGRES_HOST = {env:POSTGRES_HOST:postgres}
    POSTGRES_PASSWORD = postgres
    CHAT_ENABLED = false
commands = pytest {posargs:--verbosity=1}

[testenv:fast]
# Non-DB tests only — no postgres required
runner = uv-venv-lock-runner
package = wheel
wheel_build_env = .pkg
extras = dev
setenv =
    DJANGO_SETTINGS_MODULE = litigant_portal.settings
    SECRET_KEY = test-secret-key-for-ci
    DEBUG = true
    POSTGRES_PASSWORD = postgres
    CHAT_ENABLED = false
commands = pytest -m "not postgres" {posargs:--verbosity=1}
