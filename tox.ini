[tox]
envlist = py{313}

[testenv]
runner = uv-venv-lock-runner
package = wheel
wheel_build_env = .pkg
setenv =
    DJANGO_SETTINGS_MODULE = config.settings
    SECRET_KEY = test-secret-key-for-ci
    DATABASE_URL = postgres://postgres:postgres@localhost:5432/litigant_portal
    CHAT_ENABLED = false
commands = python manage.py test portal chat --verbosity=1
