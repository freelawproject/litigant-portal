<c-vars type="button" variant="primary" size="" href="" />
{# Variant: primary|outline|dark|ghost|danger #}
{# Size: sm|xl|icon|icon-xl (default is medium) #}
{# href: when set, renders as <a> link instead of <button> #}
{% if href %}
  <a href="{{ href }}"
     {% if id %}id="{{ id }}"{% endif %}
     {% if disabled %}aria-disabled="true" tabindex="-1"{% endif %}
     {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}
     class="rounded-lg w-fit font-normal flex gap-1 items-center transition-colors duration-200 aria-disabled:pointer-events-none {% if size == 'sm' %}py-1.5 px-2.5 text-xs{% elif size == 'xl' %}py-3 px-4.5 text-md{% elif size == 'icon' %}p-2.5{% elif size == 'icon-xl' %}p-3{% else %}py-2.5 px-3.5 text-sm{% endif %} {% if variant == 'outline' %}bg-white text-greyscale-700 border border-greyscale-300 outline-none hover:bg-greyscale-100 focus-visible:ring-4 focus-visible:ring-greyscale-300 aria-disabled:bg-white aria-disabled:text-greyscale-400 aria-disabled:border-greyscale-200{% elif variant == 'dark' %}text-white bg-greyscale-900 outline-none hover:bg-greyscale-800 focus-visible:ring-4 focus-visible:ring-greyscale-400 aria-disabled:bg-greyscale-400 aria-disabled:text-greyscale-200{% elif variant == 'ghost' %}text-greyscale-700 hover:bg-greyscale-100 focus-visible:ring-4 focus-visible:ring-greyscale-200 aria-disabled:text-greyscale-400{% elif variant == 'danger' %}text-white bg-red-500 outline-none hover:bg-red-600 focus-visible:ring-4 focus-visible:ring-red-300 aria-disabled:bg-red-200 aria-disabled:text-red-400{% else %}text-white bg-primary-600 outline-none hover:bg-primary-700 focus-visible:ring-4 focus-visible:ring-primary-300 aria-disabled:bg-primary-100 aria-disabled:text-primary-400{% endif %}{% if full_width %} w-full{% endif %} {{ class }}"
     {{ attrs }}>{{ slot }}</a>
{% else %}
  <button type="{{ type }}"
          {% if id %}id="{{ id }}"{% endif %}
          {% if disabled %}disabled{% endif %}
          {% if aria_label %}aria-label="{{ aria_label }}"{% endif %}
          class="rounded-lg w-fit font-normal flex gap-1 items-center transition-colors duration-200 disabled:cursor-not-allowed {% if size == 'sm' %}py-1.5 px-2.5 text-xs{% elif size == 'xl' %}py-3 px-4.5 text-md{% elif size == 'icon' %}p-2.5{% elif size == 'icon-xl' %}p-3{% else %}py-2.5 px-3.5 text-sm{% endif %} {% if variant == 'outline' %}bg-white text-greyscale-700 border border-greyscale-300 outline-none hover:bg-greyscale-100 focus-visible:ring-4 focus-visible:ring-greyscale-300 disabled:bg-white disabled:text-greyscale-400 disabled:border-greyscale-200{% elif variant == 'dark' %}text-white bg-greyscale-900 outline-none hover:bg-greyscale-800 focus-visible:ring-4 focus-visible:ring-greyscale-400 disabled:bg-greyscale-400 disabled:text-greyscale-200{% elif variant == 'ghost' %}text-greyscale-700 hover:bg-greyscale-100 focus-visible:ring-4 focus-visible:ring-greyscale-200 disabled:text-greyscale-400{% elif variant == 'danger' %}text-white bg-red-500 outline-none hover:bg-red-600 focus-visible:ring-4 focus-visible:ring-red-300 disabled:bg-red-200 disabled:text-red-400{% else %}text-white bg-primary-600 outline-none hover:bg-primary-700 focus-visible:ring-4 focus-visible:ring-primary-300 disabled:bg-primary-100 disabled:text-primary-400{% endif %}{% if full_width %} w-full{% endif %} {{ class }}"
          {{ attrs }}>{{ slot }}
  </button>
{% endif %}
