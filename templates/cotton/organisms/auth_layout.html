{% load static i18n %}

<c-vars />
<div
  class="min-h-dvh flex flex-col items-center justify-center px-4 py-8 bg-greyscale-50 {{ class }}"
  {{ attrs }}
>
  <div class="w-full max-w-md">

    {# Logo #}
    <div class="text-center mb-8">

      {% trans "Return to home" as return_label %}
      {% trans "Litigant Portal" as site_name %}
      <a href="{% url 'portal:home' %}" aria-label="{{ return_label }}">
        <img
          src="{% static 'images/logo.svg' %}"
          alt="{{ site_name }}"
          class="h-10 mx-auto"
        />
      </a>
    </div>

    {# Auth Card #}
    <div
      class="bg-white rounded-xl border border-greyscale-200 p-6 sm:p-8 shadow-sm"
    >

      {{ slot }}
    </div>

    {# Footer link #}
    {% if footer %}
      <div class="text-center mt-6">
        {{ footer }}
      </div>
    {% endif %}
  </div>
</div>
