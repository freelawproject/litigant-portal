<div
  class="relative origin-center transition-transform duration-700 group-hover:rotate-[60deg]"
  style="width: {{ size }}px; height: {{ size }}px;"
>
  <svg viewBox="0 0 100 100" width="{{ size }}" height="{{ size }}">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#1A1612" stroke-width="0.5" />
    <circle cx="50" cy="50" r="34" fill="none" stroke="#1A1612" stroke-width="0.5" />
    {% if seal_text %}
      <defs>
        <path id="seal-circ" d="M 50,50 m -38,0 a 38,38 0 1,1 76,0 a 38,38 0 1,1 -76,0" />
      </defs>
      <text font-size="5.5" font-family="'Geist', -apple-system, BlinkMacSystemFont, sans-serif" font-weight="500" letter-spacing="1.6" fill="#1A1612">
        <textPath href="#seal-circ" startOffset="0">{{ seal_text }}</textPath>
      </text>
    {% endif %}
  </svg>
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none text-ink">
    <svg width="{{ icon_size }}" height="{{ icon_size }}"><use href="#i-scale" /></svg>
  </div>
</div>
