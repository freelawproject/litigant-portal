{% if user.is_authenticated %}
  <div
    class="relative"
    x-data="{ userMenuOpen: false }"
    @click.outside="userMenuOpen = false"
    @keydown.escape.window="userMenuOpen = false"
  >
    <button
      @click="userMenuOpen = !userMenuOpen"
      class="flex items-center gap-2.5 pl-1.5 pr-2 py-1 rounded-full transition-colors max-w-[220px] cursor-pointer"
      :class="userMenuOpen ? 'bg-paper' : 'hover:bg-paper'"
    >
      <div class="flex items-center justify-center flex-shrink-0 w-7 h-7 rounded-full bg-paper border border-rule text-oxblood text-[11px] font-semibold font-display">
        {% if user.first_name and user.last_name %}{{ user.first_name|first|upper }}{{ user.last_name|first|upper }}{% elif user.first_name %}{{ user.first_name|slice:":2"|upper }}{% else %}{{ user.email|slice:":2"|upper }}{% endif %}
      </div>
      <span class="hidden md:inline min-w-0 truncate text-[13px] font-medium text-ink">
        {{ user.get_full_name|default:user.email }}
      </span>
      <svg
        width="13" height="13"
        class="flex-shrink-0 text-muted transition-transform duration-200"
        :class="userMenuOpen ? 'rotate-180' : ''"
      ><use href="#i-chevron-down" /></svg>
    </button>

    <div
      x-show="userMenuOpen"
      x-cloak
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 -translate-y-1"
      x-transition:enter-end="opacity-100 translate-y-0"
      class="absolute right-0 mt-2 min-w-[180px] bg-cream border border-rule rounded-xl p-1.5 shadow-menu z-40"
    >
      <a
        href="{% url 'profile' %}"
        @click="userMenuOpen = false"
        class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-ink transition-colors hover:bg-paper"
      >
        <svg class="text-muted" width="14" height="14"><use href="#i-user" /></svg>
        <span class="text-[13px]">Profile</span>
      </a>
      {% if user.is_staff %}
        <a
          href="{% url 'admin' %}"
          @click="userMenuOpen = false"
          class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-ink transition-colors hover:bg-paper"
        >
          <svg class="text-muted" width="14" height="14"><use href="#i-shield-check" /></svg>
          <span class="text-[13px]">Admin</span>
        </a>
      {% endif %}
      <div class="h-px bg-rule-soft my-1"></div>
      <form method="post" action="{% url 'logout' %}" class="w-full">
        {% csrf_token %}
        <button
          type="submit"
          class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-left text-ink transition-colors hover:bg-paper cursor-pointer"
        >
          <svg class="text-muted" width="14" height="14"><use href="#i-log-out" /></svg>
          <span class="text-[13px]">Log out</span>
        </button>
      </form>
    </div>
  </div>
{% else %}
  <div class="flex items-center gap-2">
    <a href="{% url 'login' %}" class="hidden sm:inline-flex items-center px-3 py-2 text-sm text-ink-soft transition-colors hover:text-oxblood">Log in</a>
    <a href="{% url 'register' %}" class="bg-ink text-cream text-sm px-5 py-2.5 rounded-full inline-flex items-center gap-2 transition-colors duration-[250ms] hover:bg-oxblood">
      Sign up
      <svg width="14" height="14"><use href="#i-arrow-right" /></svg>
    </a>
  </div>
{% endif %}
