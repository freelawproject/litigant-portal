{# QueryDocument call card — spinner while the reader works. Context: `args`. #}
{% load i18n %}
<div class="max-w-md rounded-lg border border-greyscale-200 bg-white overflow-hidden">
  <details class="group">
    <summary class="block px-3 py-2 cursor-pointer select-none list-none [&::-webkit-details-marker]:hidden">
      <span class="flex items-center gap-2">
        <span class="w-3.5 h-3.5 rounded-full border-2 border-primary-100 border-t-primary-600 animate-spin flex-shrink-0"
              aria-hidden="true"></span>
        <span class="text-sm text-greyscale-700">{% trans "Searching your document…" %}</span>
      </span>
      <span class="mt-1.5 flex items-center gap-1 text-xs text-greyscale-400 group-hover:text-greyscale-600 transition-colors">
        <c-atoms.icon name="chevron-right" class="w-3 h-3 transition-transform group-open:rotate-90" />
        {% trans "Show details" %}
      </span>
    </summary>
    <div class="px-3 pb-2">
      <div class="pl-4 space-y-2">
        <div>
          <p class="text-[10px] font-semibold uppercase tracking-wide text-greyscale-400">{% trans "Request" %}</p>
          <p class="text-xs text-greyscale-500 leading-relaxed">{{ args.request }}</p>
        </div>
      </div>
    </div>
  </details>
</div>
