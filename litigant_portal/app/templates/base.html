{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Litigant Portal{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/main.built.css' %}" />

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block head %}{% endblock %}
  </head>
  <body
    class="{% block body_class %}bg-cream text-ink font-sans min-h-screen w-full{% endblock %}"
    style="font-feature-settings: 'ss01','cv01','cv11'; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;"
    {% block body_attrs %}{% endblock %}
  >
    {% include "includes/icons.html" %}
    {% block content %}{% endblock %}
  </body>
</html>
