{% extends "auth/base.html" %}

{% block title %}Create an account — Litigant Portal{% endblock %}

{% block card_content %}
  <div class="text-center mb-8">
    <h1
      class="font-display font-normal text-[32px] leading-[1.05] tracking-[0.005em]"
      style="font-variation-settings: 'opsz' 144, 'SOFT' 30;"
    >
      Create an account
    </h1>
    <p class="mt-3 text-[14px] text-ink-soft">
      Start your conversation.
    </p>
  </div>

  <form method="post" class="w-full flex flex-col gap-4">
    {% csrf_token %}

    <div class="grid grid-cols-2 gap-3">
      <label class="block">
        <span class="eyebrow text-muted mb-2 block">First name <span class="text-muted/70 normal-case tracking-normal">(optional)</span></span>
        <input
          type="text"
          name="first_name"
          autocomplete="given-name"
          class="w-full px-4 py-3 bg-cream border border-rule rounded-xl text-[15px] text-ink outline-none transition-all focus:border-ink focus:shadow-composer-focus"
        />
      </label>
      <label class="block">
        <span class="eyebrow text-muted mb-2 block">Last name <span class="text-muted/70 normal-case tracking-normal">(optional)</span></span>
        <input
          type="text"
          name="last_name"
          autocomplete="family-name"
          class="w-full px-4 py-3 bg-cream border border-rule rounded-xl text-[15px] text-ink outline-none transition-all focus:border-ink focus:shadow-composer-focus"
        />
      </label>
    </div>

    <label class="block">
      <span class="eyebrow text-muted mb-2 block">Email</span>
      <input
        type="email"
        name="email"
        autocomplete="email"
        required
        class="w-full px-4 py-3 bg-cream border border-rule rounded-xl text-[15px] text-ink outline-none transition-all focus:border-ink focus:shadow-composer-focus"
      />
    </label>

    <label class="block">
      <span class="eyebrow text-muted mb-2 block">Password</span>
      <input
        type="password"
        name="password"
        autocomplete="new-password"
        required
        class="w-full px-4 py-3 bg-cream border border-rule rounded-xl text-[15px] text-ink outline-none transition-all focus:border-ink focus:shadow-composer-focus"
      />
    </label>

    <label class="block">
      <span class="eyebrow text-muted mb-2 block">Confirm password</span>
      <input
        type="password"
        name="confirm_password"
        autocomplete="new-password"
        required
        class="w-full px-4 py-3 bg-cream border border-rule rounded-xl text-[15px] text-ink outline-none transition-all focus:border-ink focus:shadow-composer-focus"
      />
    </label>

    <button
      type="submit"
      class="bg-ink text-cream text-[14px] font-medium w-full py-3.5 rounded-xl mt-2 inline-flex items-center justify-center gap-2 cursor-pointer transition-colors hover:bg-oxblood"
    >
      Create account
      <svg width="14" height="14"><use href="#i-arrow-right" /></svg>
    </button>
  </form>

  <div class="mt-8 text-[13px] text-ink-soft text-center">
    Already have an account?
    <a href="{% url 'login' %}" class="underline-link-soft text-ink font-medium ml-1">Sign in</a>
  </div>
{% endblock %}
