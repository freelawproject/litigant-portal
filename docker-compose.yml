# Litigant Portal Docker Compose

services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-http://portal.localhost}
    depends_on:
      - app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: litigant_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: web-dev
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: litigant_portal
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-dev}
      SECRET_KEY: ${SECRET_KEY:-dev}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-portal.localhost}
      DEBUG: ${DEBUG:-true}
      CHAT_ENABLED: ${CHAT_ENABLED:-true}
      CHAT_MODEL: ${CHAT_MODEL:-openai/gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
