# Litigant Portal Docker Compose
#
# Development: docker compose --profile dev up
#   - Requires .env file with OPENAI_API_KEY (copy from .env.example)
#   - Auto-generates SECRET_KEY if not set
#   - Access at http://localhost (port 80 via Caddy)
#
# Production: docker compose --profile prod up
#   - Requires: secrets/django_secret_key.txt, DOMAIN in .env
#   - Caddy auto-provisions HTTPS via Let's Encrypt

services:
  # ---------------------------------------------------------------------------
  # Development Django Server
  # ---------------------------------------------------------------------------
  django-dev:
    build: .
    profiles: ['dev']
    command: web-dev
    environment:
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-auto}
      - ALLOWED_HOSTS=portal.localhost
      # AI Chat configuration
      - CHAT_ENABLED=${CHAT_ENABLED:-true}
      - CHAT_MODEL=openai/gpt-4o-mini
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # Production Django Server
  # ---------------------------------------------------------------------------
  django-prod:
    build: .
    profiles: ['prod']
    command: web-prod
    environment:
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DATABASE_URL=sqlite:////data/db.sqlite3
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-3}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      # AI Chat configuration
      - CHAT_ENABLED=${CHAT_ENABLED:-true}
      - CHAT_MODEL=${CHAT_MODEL:-openai/gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    secrets:
      - django_secret_key
    volumes:
      - sqlite_data:/data
      - staticfiles:/app/staticfiles

  # ---------------------------------------------------------------------------
  # Caddy Reverse Proxy (Development)
  # ---------------------------------------------------------------------------
  caddy-dev:
    image: caddy:2-alpine
    profiles: ['dev']
    ports:
      - '80:80'
    environment:
      - DOMAIN=${DOMAIN:-http://portal.localhost}
    volumes:
      - ./deploy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - django-dev

  # ---------------------------------------------------------------------------
  # Caddy Reverse Proxy (Production)
  # ---------------------------------------------------------------------------
  caddy-prod:
    image: caddy:2-alpine
    profiles: ['prod']
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env or environment}
    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - staticfiles:/srv/staticfiles:ro
    # NOTE: depends_on waits for container start, not for collectstatic to
    # finish. Static assets may 404 briefly on first deploy until Django's
    # entrypoint completes collectstatic into the shared volume.
    depends_on:
      - django-prod

# ---------------------------------------------------------------------------
# Secrets (create these files locally, never commit them)
# ---------------------------------------------------------------------------
secrets:
  django_secret_key:
    file: ./secrets/django_secret_key.txt

volumes:
  sqlite_data:
  staticfiles:
  caddy_data:
  caddy_config:
