# Litigant Portal Docker Compose
#
# Development: docker compose --profile dev up
#   - Requires .env file with OPENAI_API_KEY (copy from .env.example)
#   - Auto-generates SECRET_KEY if not set
#   - Access at http://localhost (port 80 via Caddy)
#
# Production: docker compose --profile prod up
#   - Requires: secrets/django_secret_key.txt, DOMAIN in .env
#   - Caddy auto-provisions HTTPS via Let's Encrypt

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (pgvector)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    profiles: ['dev', 'prod']
    environment:
      - POSTGRES_DB=litigant_portal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  # ---------------------------------------------------------------------------
  # Development Django Server
  # ---------------------------------------------------------------------------
  django-dev:
    build: .
    profiles: ['dev']
    command: web-dev
    environment:
      - DEBUG=true
      - SECRET_KEY=${SECRET_KEY:-auto}
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/litigant_portal
      - ALLOWED_HOSTS=localhost,portal.localhost,127.0.0.1,0.0.0.0
      # AI Chat configuration
      - CHAT_ENABLED=${CHAT_ENABLED:-true}
      - CHAT_MODEL=openai/gpt-4o-mini
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Production Django Server
  # ---------------------------------------------------------------------------
  django-prod:
    build: .
    profiles: ['prod']
    command: web-prod
    environment:
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/django_secret_key
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litigant_portal
      - ALLOWED_HOSTS=localhost,${ALLOWED_HOSTS:-localhost}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-3}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-2}
      # AI Chat configuration
      - CHAT_ENABLED=${CHAT_ENABLED:-true}
      - CHAT_MODEL=${CHAT_MODEL:-openai/gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health/']
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 3
    secrets:
      - django_secret_key
    volumes:
      - staticfiles:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Caddy Reverse Proxy (Development)
  # ---------------------------------------------------------------------------
  caddy-dev:
    image: caddy:2-alpine
    profiles: ['dev']
    ports:
      - '80:80'
    volumes:
      - ./deploy/caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - django-dev

  # ---------------------------------------------------------------------------
  # Caddy Reverse Proxy (Production)
  # ---------------------------------------------------------------------------
  caddy-prod:
    image: caddy:2-alpine
    profiles: ['prod']
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN:-}
    volumes:
      - ./deploy/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - staticfiles:/srv/staticfiles:ro
    depends_on:
      django-prod:
        condition: service_healthy

# ---------------------------------------------------------------------------
# Secrets (create these files locally, never commit them)
# ---------------------------------------------------------------------------
secrets:
  django_secret_key:
    file: ./secrets/django_secret_key.txt

volumes:
  postgres_data:
  staticfiles:
  caddy_data:
  caddy_config:
