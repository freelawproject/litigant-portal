services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_DB=litigant_portal
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data_pg17:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: web-dev
    environment:
      - DEBUG=true
      - DEPLOYMENT_ENV=dev
      - SECRET_KEY=dev
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=localhost,portal.localhost,127.0.0.1,0.0.0.0
      # AI Chat configuration
      - CHAT_ENABLED=${CHAT_ENABLED:-true}
      - CHAT_MODEL=openai/gpt-4o-mini
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_REGION_NAME=${AWS_S3_REGION_NAME:-us-east-1}
      - AWS_S3_ENDPOINT_URL=${AWS_S3_ENDPOINT_URL:-}
      - AWS_S3_CUSTOM_DOMAIN=${AWS_S3_CUSTOM_DOMAIN:-}
      - AWS_STORAGE_PUBLIC_BUCKET_NAME=${AWS_STORAGE_PUBLIC_BUCKET_NAME}
      - AWS_STORAGE_PRIVATE_BUCKET_NAME=${AWS_STORAGE_PRIVATE_BUCKET_NAME}
    volumes:
      - ./litigant_portal:/app/litigant_portal
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - django

volumes:
  postgres_data_pg17:
