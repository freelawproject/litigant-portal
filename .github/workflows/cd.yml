name: Deploy to DigitalOcean (manual)

# The DigitalOcean QA box (qa.litigantportal.com) is a manual-dispatch fallback,
# not continuous deployment. It used to auto-deploy on every merge to main via a
# `git reset --hard origin/main` on the box — which meant a broken main would
# take QA down. During the v1→v2 chat migration main is expected to break, so we
# froze QA at its last deliberate deploy: it only updates when someone runs this
# workflow by hand (Actions → Run workflow). Image publishing for AWS continues
# independently in deploy.yml ("Build and Push to Docker Hub") on every merge.
# The pull_request trigger stays as the pre-merge docker-build guardrail (#592).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # PR: validate Docker build (no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/django/Dockerfile
          push: false

  # ---------------------------------------------------------------------------
  # manual dispatch: build, push to GHCR, deploy to the DigitalOcean QA box
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build, push, deploy to QA
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    # Serialize deploys so back-to-back manual runs don't race the SSH step.
    # cancel-in-progress=false queues subsequent runs in order.
    concurrency:
      group: qa-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/freelawproject/litigant-portal
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: docker/django/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Deploy to QA
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            set -e
            cd /opt/litigant-portal
            # Sync the deploy tree to the just-merged main BEFORE bringing the
            # stack up. Pulling the image alone never updated docker-compose.yml
            # / Caddy / env on the box, so a change that adds a new service
            # (e.g. redis-prod) silently never started it and /api/health/
            # returned 503 (#501). reset --hard keeps the box an exact mirror of
            # main — the deploy box holds no local edits.
            git fetch origin
            git reset --hard origin/main
            # Reclaim disk BEFORE pulling. Each deploy pulls a fresh image and
            # the superseded ones accumulate unbounded — the box hit 99% full /
            # "no space left on device" mid-pull and QA went down (#521). The
            # running stack's image is referenced by its container, so it's
            # kept; only orphaned images are removed. Prune images only (not
            # `system prune`): image accumulation is the whole problem, and
            # `image prune` leaves stopped containers, networks, and build cache
            # alone — smallest blast radius on a box compose fully manages.
            # There's no build cache to reclaim here anyway (deploys pull, never
            # build). Images carry no --volumes flag, so postgres data is safe.
            docker image prune -af
            # Pull base prod images only (all `--profile prod` services: app,
            # caddy, postgres, redis). The docassemble override is applied at
            # `up` below, not here, on purpose: docassemble
            # is the ~20 GB jhpyle/docassemble all-in-one, and its running
            # container references the local image, so `up` reuses it — no need to
            # re-pull it on every deploy.
            docker compose --profile prod pull
            # Bring the stack up WITH the docassemble override so caddy-prod keeps
            # the conf.d mount that routes /interview/* to docassemble (#558). A
            # base-only `up` recreated caddy without the mount and silently dropped
            # the /interview/ route on every deploy — 404-ing the Topic Flow
            # handoff button until restored by hand.
            docker compose -f docker-compose.yml -f docker-compose.docassemble.qa.yml --profile prod up -d --no-build

      - name: Verify deploy
        # Poll /api/health/ until 200 or timeout. Fails the workflow if the new
        # image crash-loops or the container never serves — otherwise GitHub
        # Actions reports the deploy as successful even when the site is down.
        run: |
          for i in {1..30}; do
            if curl -fsS https://qa.litigantportal.com/api/health/ > /dev/null; then
              echo "deploy healthy"
              exit 0
            fi
            sleep 2
          done
          echo "deploy failed health check"
          exit 1
