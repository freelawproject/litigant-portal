name: Deploy Staging to EKS

# Build the portal image from `staging` and roll it out to the `litigant`
# namespace on the courtlistener EKS cluster.
#
# For now prod (`litigant`) is driven from `staging`; it will be split onto
# `main` later. qa-litigant is not wired up here yet. The Docker Hub publish on
# `main` lives in deploy.yml and is unaffected by this workflow.
#
# NOTE on migrations: the litigant web-prod entrypoint runs
# compilemessages + collectstatic + migrate on every container start
# (docker/django/entrypoint.sh). So the temp-pod below APPLIES migrations
# (`manage migrate`, idempotent) rather than scanning's `migrate --check`,
# which would false-fail on legitimately-unapplied new migrations. Running it
# in the temp-pod first means a broken migration aborts the deploy BEFORE the
# web deployment is touched; the web pod then re-runs migrate as a no-op.

on:
  push:
    branches:
      - staging

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: courtlistener
  EKS_NAMESPACE: litigant

# contents: read for checkout; pull-requests: read so get-pr-labels can look up
# the merged PR's labels (skip-deploy / skip-web-deploy escape hatches).
permissions:
  contents: read
  pull-requests: read

# Serialize deploys so back-to-back pushes roll out in order.
concurrency:
  group: litigant-staging-deploy
  cancel-in-progress: false

jobs:
  get-pr-labels:
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.find_pr.outputs.labels }}
    steps:
      - uses: actions/checkout@v6
      - name: Find merged PR by merge_commit_sha
        id: find_pr
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const commitSha = context.sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "closed",
              sort: "updated",
              direction: "desc",
              per_page: 1
            });

            const pr = prs.find(p => p.merge_commit_sha === commitSha);
            if (!pr) {
              core.setOutput("labels", "");
              core.warning("No merged PR found for this commit.");
              return;
            }

            const labels = pr.labels.map(l => l.name);
            core.setOutput("labels", labels.join(","));
            console.log(`PR #${pr.number} labels: ${labels.join(", ")}`);

  build:
    needs: get-pr-labels
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.get-pr-labels.outputs.labels, 'skip-deploy') }}
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v6
      - name: Set shortcode
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        run: make push-image -e VERSION=${{ steps.vars.outputs.sha_short }}

  setup-deploy:
    needs: [get-pr-labels, build]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create Kubeconfig with AWS CLI
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      # Force the ExternalSecret to re-sync so the litigant-env Secret is current
      # before the temp-pod (and the web pod) read it via envFrom.
      - name: Update Environment Variables
        env:
          LITIGANT_ENV: litigant-env
        run: kubectl annotate es $LITIGANT_ENV force-sync=$(date +%s) --overwrite -n ${{ env.EKS_NAMESPACE }} && kubectl wait es -n ${{ env.EKS_NAMESPACE }} --for=jsonpath="{.status.conditions[?(@.reason=='SecretSynced')].status}"=True --timeout=30s $LITIGANT_ENV

      # Sleep-only override bypasses the entrypoint so we control migrate/collectstatic.
      - name: Launch Temporary Pod
        run: |
          kubectl run temp-pod-${{ needs.build.outputs.sha_short }} -n ${{ env.EKS_NAMESPACE }} --image=freelawproject/litigant-portal:${{ needs.build.outputs.sha_short }}-prod --restart Never --pod-running-timeout=120s --overrides='
          {
              "spec": {
              "containers": [{
                  "name": "temp-pod",
                  "image": "freelawproject/litigant-portal:${{ needs.build.outputs.sha_short }}-prod",
                  "command": ["/bin/sh", "-c", "trap : TERM INT; sleep 3600 & wait"],
                  "envFrom": [{
                  "secretRef": {
                      "name": "litigant-env"
                  }
                  }]
              }]
              }
          }'
      - name: Wait for Temporary Pod to Start
        run: kubectl wait pods -n ${{ env.EKS_NAMESPACE }} --for condition=Ready --timeout=90s temp-pod-${{ needs.build.outputs.sha_short }}

      - name: Collect Static Assets
        run: kubectl exec -n ${{ env.EKS_NAMESPACE }} temp-pod-${{ needs.build.outputs.sha_short }} -- manage collectstatic --noinput --clear
      - name: Handle Collectstatic Error
        if: failure()
        run: |
          echo "collectstatic failed--aborting deploy"
          exit 1

      - name: Apply Migrations
        run: kubectl exec -n ${{ env.EKS_NAMESPACE }} temp-pod-${{ needs.build.outputs.sha_short }} -- manage migrate --noinput
      - name: Handle Migration Error
        if: failure()
        run: |
          echo "Migrations failed. Open a shell into pod temp-pod-${{ needs.build.outputs.sha_short }} to investigate."
          echo "That pod deletes itself after an hour."
          exit 1

      - name: Delete Temporary Pod
        run: kubectl delete pod -n ${{ env.EKS_NAMESPACE }} temp-pod-${{ needs.build.outputs.sha_short }}

  deploy-web:
    needs: [get-pr-labels, build, setup-deploy]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.get-pr-labels.outputs.labels, 'skip-web-deploy') }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Create Kubeconfig with AWS CLI
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Rollout litigant-web
        run: kubectl set image -n ${{ env.EKS_NAMESPACE }} deployment/litigant-web web=freelawproject/litigant-portal:${{ needs.build.outputs.sha_short }}-prod
      - name: Watch litigant-web rollout status
        run: kubectl rollout status -n ${{ env.EKS_NAMESPACE }} deployment/litigant-web
