name: Task
description: Chore, refactor, docs, infra, tech debt, or other non-feature work
labels: ['task']
body:
  - type: textarea
    id: what
    attributes:
      label: What needs to change?
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: Motivation — bug-prone code, slow tests, drift, missing docs, etc.

  - type: textarea
    id: dod
    attributes:
      label: Definition of done (optional)
      value: |
        - [ ]
